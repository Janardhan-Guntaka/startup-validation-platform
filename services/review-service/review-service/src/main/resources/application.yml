spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://localhost:5432/validationdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082
management:
  endpoints:
    web:
      exposure:
        include: health,info
